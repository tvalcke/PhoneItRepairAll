<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PHONE-IT REPAIR ALL | Accès rapide</title>
    <meta name="description" content="Accès rapide vers PHONE-IT REPAIR ALL." />
    <link rel="icon" href="assets/logo/logo.jpg" type="image/jpeg" />
    <style>
      :root {
        color-scheme: light;
        --primary: #0f172a;
        --accent: #2563eb;
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, var(--bg) 0%, #e2e8f0 100%);
        font-family: Inter, Arial, sans-serif;
        color: var(--text);
        padding: 24px;
      }

      .card {
        width: min(100%, 480px);
        background: var(--card);
        border-radius: 24px;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
        padding: 32px 24px;
        text-align: center;
      }

      .logo {
        width: 96px;
        height: 96px;
        display: block;
        margin: 0 auto 16px;
        border-radius: 20px;
        object-fit: cover;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.6rem;
        font-weight: 800;
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
        line-height: 1.6;
      }

      .links {
        display: grid;
        gap: 12px;
      }

      .btn {
        display: block;
        width: 100%;
        padding: 14px 16px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      .btn:hover,
      .btn:focus-visible {
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(37, 99, 235, 0.18);
      }

      .btn-primary {
        background: var(--accent);
        color: white;
      }

      .btn-social {
        background: #f8fafc;
        color: var(--primary);
        border: 1px solid #e2e8f0;
      }

      .note {
        margin-top: 16px;
        font-size: 0.9rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img class="logo" src="assets/logo/logo.jpg" alt="Logo PHONE-IT REPAIR ALL" />
      <h1>PHONE-IT REPAIR ALL</h1>
      <p>Choisissez l’option qui vous convient pour rejoindre PHONE-IT REPAIR ALL.</p>

      <div class="links">
        <a class="btn btn-primary" href="index.html">Visiter le site principal</a>
        <a class="btn btn-social" href="https://www.facebook.com/p/Phone-it-Repair-all-61587703160507/" target="_blank" rel="noopener noreferrer">Facebook</a>
        <a class="btn btn-social" href="https://www.instagram.com/phoneitrepairall?igsh=MTQyejhicXNyZ3hjag==" target="_blank" rel="noopener noreferrer">Instagram</a>
      </div>

    </main>
  </body>
</html>
